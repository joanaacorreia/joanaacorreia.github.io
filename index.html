            <div class="title" id="title">
                <h1>Joana Correia's Portfolio</h1>
                <p>Attack the monsters to retrieve the information!</p>
            </div>

            <div class="sky-overlay hidden" id="sky-overlay">

            <!-- —— about section —— -->
            <template id="content-about">
                <div class="section-layout">

                    <div class="section-header">
                        <h2 class="section-title">ABOUT ME</h2>
                        <p class="about-quote">"Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself." <span>~ Rumi</span></p>
                    </div>

                    <p class="about-intro">
                        Computer engineering student with a focus on robotics and embedded systems, with growing interests in cybersecurity. Drawn to the logic behind things — how they're built, why they work, and whether there's a better way to do it.
                    </p>

                    <div class="about-top-row">
                        <div class="about-prose-col">
                            <div class="about-divider"><span class="about-divider-label">BACKGROUND</span></div>
                            <div class="about-prose-columns">
                                <p class="about-prose">Curiosity was always there — dismantling things mentally before physically, wondering what was inside the machines, theorising about their structure and how they worked. Growing up around someone deep in the field made it concrete. By the time I built my first robotic arm in secondary school, the direction was obvious.</p>
                                <p class="about-prose">Funnily enough, the first real encounter with cybersecurity was being the threat. Trying to install a Bratz cursor at age eight somehow resulted in enough viruses and malware that my brother — who went on to work in the field — was almost impressed at the damage. Years later, a professor told me girls didn't belong in computer engineering. I got 100% in his electronics exam — the grade he spent lectures insisting nobody ever got.</p>
                            </div>
                        </div>

                        <div class="section-card about-spark-card">
                            <span class="card-label">⚔ WORKING ON</span>
                            <p>Currently focused on algorithms and data structures — specifically the obsession with writing things the most efficient way possible.</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- —— projects section —— -->
            <template id="content-projects">
                <div class="section-layout">

                    <div class="section-header">
                        <h2 class="section-title">PROJECTS</h2>
                        <p class="section-subtitle">Some univeristy and personal projects of mine</p>
                    </div>

                    <div class="quest-log">
                        <div class="quest-entry quest-featured">
                            <div class="quest-meta">
                                <span class="quest-rank">★★★</span>
                                <span class="card-label">MAIN QUEST</span>
                                <div class="card-tags">
                                    <span class="tag">C++</span>
                                    <span class="tag">Arduino</span>
                                    <span class="tag">ESP8266</span>
                                    <span class="tag">IoT</span>
                                    <span class="tag">HTML/CSS/JS</span>
                                </div>
                            </div>
                            <h3 class="quest-title"><a href="https://github.com/joanaacorreia/mission-control-hmi" target="_blank" class="quest-link">Mission Control HMI</a></h3>
                            <p class="quest-desc">A university project — an embedded system that simulates a bomb defusal mission through a series of logic challenges. Built on a distributed architecture with an Arduino Uno handling real-time hardware control and an ESP8266 serving a live web interface over Wi-Fi, synchronising game state between physical components and browser in real time.</p>
                        </div>

                        <div class="quest-entry quest-featured">
                            <div class="quest-meta">
                                <span class="quest-rank">★★★</span>
                                <span class="card-label">MAIN QUEST</span>
                                <div class="card-tags">
                                    <span class="tag">Java</span>
                                    <span class="tag">Data Structures</span>
                                    <span class="tag">Algorithms</span>
                                </div>
                            </div>
                            <h3 class="quest-title">DEISI World Meter</h3>
                            <p class="quest-desc">A university project — a Java application that ingests demographic datasets of countries and cities, builds efficient in-memory data structures, and responds to statistical queries with a focus on algorithmic optimisation.</p>
                        </div>

                        <div class="quest-entry">
                            <div class="quest-meta">
                                <span class="quest-rank">★★☆</span>
                                <span class="card-label">SIDE QUEST</span>
                                <div class="card-tags">
                                    <span class="tag">Python</span>
                                    <span class="tag">MediaPipe</span>
                                    <span class="tag">OpenCV</span>
                                </div>
                            </div>
                            <h3 class="quest-title"><a href="https://github.com/joanaacorreia/domain-expansion-recognition" target="_blank" class="quest-link">Domain Expansion Recognition</a></h3>
                            <p class="quest-desc">A Python program that uses MediaPipe and OpenCV to detect hand signs in real time and trigger the corresponding Jujutsu Kaisen domain expansion animation and audio. Still in progress.</p>
                        </div>
                    </div>
                </div>
            </template>

                            </a>

            <!-- —— toolbox section —— -->
            <template id="content-toolbox">
                <div class="section-layout">

                    <div class="section-header">
                        <h2 class="section-title">TOOLBOX</h2>
                        <p class="section-subtitle">How I work</p>
                    </div>

                    <div class="process-grid">

                        <div class="process-step">
                            <span class="process-watermark">01</span>
                            <span class="process-title">Review &amp; Plan</span>
                            <p class="process-body">Start by understanding the problem — solo or with colleagues. Think through possibilities, constraints, and edge cases. Albeit not everything gets figured out here, it's a start.</p>
                        </div>

                        <div class="process-step">
                            <span class="process-watermark">02</span>
                            <span class="process-title">Sketch Architecture</span>
                            <p class="process-body">Before writing a single line of code, the logic gets drawn out. Flowcharts, diagrams, pen and paper — whatever maps the structure clearly.</p>
                        </div>

                        <div class="process-step">
                            <span class="process-watermark">03</span>
                            <span class="process-title">Set Up &amp; Build</span>
                            <p class="process-body">Environments configured, tools ready. Then build — iteratively, not all at once. More questions come up here than anywhere else.</p>
                        </div>

                        <div class="process-step process-step-debug">
                            <span class="process-watermark">!</span>
                            <span class="process-title">When Something Breaks</span>
                            <p class="process-body">Debugging starts with reading the error, tracing the logic, searching online. If that fails — pen and paper, a professor, or a colleague from an older year.</p>
                            <span class="process-aside">can happen at any point in the process</span>
                        </div>

                        <div class="process-step">
                            <span class="process-watermark">04</span>
                            <span class="process-title">Optimise &amp; Clean Up</span>
                            <p class="process-body">Once it works, make it better. Optimise, cut redundancy, keep the code clean and organised. An outside perspective at this stage often surfaces constraints, edge cases, or questions that proximity to the code makes it easy to miss.</p>
                        </div>

                        <div class="process-step process-step-end">
                            <span class="process-watermark">✓</span>
                            <span class="process-title">Document &amp; README</span>
                            <p class="process-body">Write the README. If it's a uni project, write the report too. The work isn't done until someone else could pick it up and understand it.</p>
                        </div>

                    </div>
                </div>
            </template>
