<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joana Correia</title>
    <link rel="stylesheet" href="style.css">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet"/>
</head>

<body>
    <main class="scene">

        <section class="sky" id="sky">
            <div class="particles" id="particles"></div>

            <div class="title" id="title">
                <h1>Joana Correia's Portfolio</h1>
                <p>Attack the monsters to retrieve the information!</p>
            </div>
        </section>

        <div class="ground" id="ground">
            <div class="binary-strip" id="binary-strip"></div>

            <!-- monsters -->
            <div class="monsters" id="monsters">

                <div class="monster-wrap" id="monster-about" data-id="about" data-label="ABOUT ME">
                    <div class="monster-pin">
                        <span class="monster-pin-bubble">ABOUT ME</span>
                        <svg class="monster-pin-drop" viewBox="0 0 18 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path 
                                d="M9 0C4.03 0 0 4.03 0 9C0 15.75 9 22 9 22C9 22 18 15.75 18 9C18 4.03 13.97 0 9 0Z"
                                fill="rgba(236,72,153,0.85)"
                                stroke="rgba(244,114,182,0.9)"
                                stroke-width="1"
                                style="filter: drop-shadow(0 0 6px rgba(236,72,153,0.8))"/>
                        </svg>
                    </div>
                    <div class="monster-sprite-container" id="sprite-container-about">
                        <img 
                            src="assets/monster-walk-right-spritesheet.png"
                            alt="About me monster"
                            class="monster-sprite pixelart"
                            id="monster-sprite-about"/>
                    </div>
                </div> 

                <div class="monster-wrap" id="monster-projects" data-id="projects" data-label="PROJECTS">
                    <div class="monster-pin">
                        <span class="monster-pin-bubble">PROJECTS</span>
                        <svg class="monster-pin-drop" viewBox="0 0 18 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path 
                                d="M9 0C4.03 0 0 4.03 0 9C0 15.75 9 22 9 22C9 22 18 15.75 18 9C18 4.03 13.97 0 9 0Z"
                                fill="rgba(236,72,153,0.85)"
                                stroke="rgba(244,114,182,0.9)"
                                stroke-width="1"
                                style="filter: drop-shadow(0 0 6px rgba(236,72,153,0.8))"/>
                        </svg>
                    </div>
                    <div class="monster-sprite-container" id="sprite-container-projects">
                        <img
                            src="assets/monster-walk-right-spritesheet.png"
                            alt="Projects monster"
                            class="monster-sprite pixelart"
                            id="monster-sprite-projects"/>
                    </div>
                </div>

                <div class="monster-wrap" id="monster-skills" data-id="skills" data-label="SKILLS">
                    <div class="monster-pin">
                        <span class="monster-pin-bubble">SKILLS</span>
                        <svg class="monster-pin-drop" viewBox="0 0 18 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path 
                                d="M9 0C4.03 0 0 4.03 0 9C0 15.75 9 22 9 22C9 22 18 15.75 18 9C18 4.03 13.97 0 9 0Z"
                                fill="rgba(236,72,153,0.85)"
                                stroke="rgba(244,114,182,0.9)"
                                stroke-width="1"
                                style="filter: drop-shadow(0 0 6px rgba(236,72,153,0.8))"/>
                        </svg>
                    </div>
                    <div class="monster-sprite-container" id="sprite-container-skills">
                        <img
                            src="assets/monster-walk-right-spritesheet.png"
                            alt="Skills monster"
                            class="monster-sprite pixelart"
                            id="monster-sprite-skills"/>
                    </div>
                </div>

                <div class="monster-wrap" id="monster-contact" data-id="contact" data-label="CONTACT">
                    <div class="monster-pin">
                        <span class="monster-pin-bubble">CONTACT</span>
                        <svg class="monster-pin-drop" viewBox="0 0 18 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path 
                                d="M9 0C4.03 0 0 4.03 0 9C0 15.75 9 22 9 22C9 22 18 15.75 18 9C18 4.03 13.97 0 9 0Z"
                                fill="rgba(236,72,153,0.85)"
                                stroke="rgba(244,114,182,0.9)"
                                stroke-width="1"
                                style="filter: drop-shadow(0 0 6px rgba(236,72,153,0.8))"/>
                        </svg>
                    </div>
                    <div class="monster-sprite-container" id="sprite-container-contact">
                        <img
                            src="assets/monster-walk-right-spritesheet.png"
                            alt="Contact monster"
                            class="monster-sprite pixelart"
                            id="monster-sprite-contact"/>
                    </div>
            </div>
        </div>

        <!-- player sprite -->
        <div class="player" id="player">
            <div class="player-container idle" id="player-container">
                <img 
                    src="assets/player_idle.png" 
                    alt="Player Sprite" 
                    class="pixelart" 
                    id="player-sprite"/>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
